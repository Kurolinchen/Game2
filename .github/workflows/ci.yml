name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test
      - run: npm run typecheck
      - run: npm run build
      - name: Run multiplayer smoke
        run: |
          setsid npm run start -w @tactics-lite/server > server.log 2>&1 &
          SERVER_PID=$!
          stop_server() {
            # Kill the whole process group: killing only the npm wrapper
            # orphans the node child, which keeps port 2567 busy and fails
            # the Playwright web server in the e2e step.
            kill -- "-$SERVER_PID" 2>/dev/null || true
            for attempt in {1..15}; do
              curl --fail --silent http://127.0.0.1:2567/health > /dev/null 2>&1 || return 0
              sleep 1
            done
          }
          trap stop_server EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:2567/health > /dev/null; then break; fi
            sleep 1
          done
          npm run smoke:multiplayer
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run balance:cpu
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report
            test-results
            server.log
          if-no-files-found: ignore
          retention-days: 7
