name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test
      - run: npm run typecheck
      - run: npm run build
      - name: Run multiplayer smoke
        run: |
          npm run start -w @tactics-lite/server > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:2567/health > /dev/null; then break; fi
            sleep 1
          done
          npm run smoke:multiplayer
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run balance:cpu
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report
            test-results
            server.log
          if-no-files-found: ignore
          retention-days: 7
